random.seed=42
repetition.number=1
confidence.level=0.95

# Possible values for experiment are;
# base          | ver-base  | val-base-1 | val-base-2
# trans-b-1     | trans-b-2 | trans-b-3  | base-exp-1
# base-exp-2    | val-adv-1 | val-adv-2  | trans-adv-1
# trans-adv-2   | adv-exp-1 | adv-exp-2
experiment=val-adv-1

# Arrival params
distribution.arrivals.mu=0.15
distribution.arrivals.cv=4

# Services params
distribution.services.z=0.16
distribution.services.cv=4

# Distribution type
distribution.arrivals.type=h2
distribution.services.type=h2

# Stop condition value
system.empty_jobs=true
system.stop=50000
system.start=0

# Server capacities
webserver.capacity=1
spikeserver.capacity=1

# Infrastructure params
infrastructure.start_num_server=1
infrastructure.max_num_server=1
infrastructure.scheduler=leastUsed
infrastructure.si_max=90
infrastructure.spikeserver.active=true

# Long-term fluctuations
distribution.arrivals.total_period=0
distribution.arrivals.fast_interval=0
distribution.arrivals.fast_mu=0

output.dir=output

batch.size=16384
batch.num=16
server.level.batch.mean=false

log.fine=true

turn.on.mu=5
turn.on.std=0.5

# r0 | jobs
scaling.indicator.type=r0
scaling.out.threshold=2
sliding.window.size=5

# Set to anything other than 0 only to print seeds to CSV
total.stream=0